<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル4択クイズ</title>
    <!-- 見た目を簡単に整えるためにTailwind CSSを読み込みます -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 選択肢ボタンのアニメーション用スタイル */
        .choice-btn {
            transition: all 0.2s ease-in-out;
        }
        .choice-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-6 md:p-8">
        
        <!-- クイズ画面 -->
        <div id="quiz-screen">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-blue-600">クイズ</h1>
                <span id="question-counter" class="text-sm font-semibold bg-blue-100 text-blue-800 py-1 px-3 rounded-full">
                    第 1 問 / 全 3 問
                </span>
            </div>

            <!-- 問題文 -->
            <h2 id="question-text" class="text-xl mb-6 font-medium leading-relaxed text-gray-700">
                ここに問題文が表示されます。
            </h2>

            <!-- 選択肢 -->
            <div id="choices-container" class="grid grid-cols-1 gap-3 mb-6">
                <!-- Javascriptでボタンが生成されます -->
            </div>

            <!-- 正誤判定メッセージ -->
            <div id="feedback-message" class="text-center font-bold text-lg mb-4 hidden">
            </div>

            <!-- 次へボタン -->
            <div class="text-right mt-4">
                <button id="next-btn" class="hidden bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg transition-colors" onclick="nextQuestion()">
                    次へ進む
                </button>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden text-center">
            <h2 class="text-3xl font-bold mb-4">結果発表</h2>
            <p class="text-xl mb-6">
                あなたの正解数は... <br>
                <span id="score-text" class="text-4xl font-extrabold text-blue-600">0</span> / <span id="total-text">0</span> 問！
            </p>
            <div id="evaluation-message" class="text-gray-600 mb-8 font-medium"></div>
            <button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-lg w-full transition-colors" onclick="restartQuiz()">
                もう一度挑戦する
            </button>
        </div>

    </div>

    <script>
        // クイズのデータ（問題を追加・変更したい場合はここを編集します）
        const quizData = [
            {
                question: "日本で一番高い山はどれ？",
                choices: ["北岳", "富士山", "奥穂高岳", "槍ヶ岳"],
                correctIndex: 1 // 0から数えるので、1は「富士山」
            },
            {
                question: "太陽系の惑星で一番大きいのは？",
                choices: ["地球", "火星", "木星", "土星"],
                correctIndex: 2 // 2は「木星」
            },
            {
                question: "HTMLは何の略？",
                choices: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Module Link",
                    "Home Tool Markup Language"
                ],
                correctIndex: 0
            },
            {
                question: "1日は何分？",
                choices: ["1200分", "1440分", "2400分", "3600分"],
                correctIndex: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // DOM要素の取得
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const choicesContainer = document.getElementById('choices-container');
        const nextBtn = document.getElementById('next-btn');
        const questionCounter = document.getElementById('question-counter');
        const feedbackMessage = document.getElementById('feedback-message');
        
        // 問題を表示する関数
        function loadQuestion() {
            // 状態のリセット
            hasAnswered = false;
            nextBtn.classList.add('hidden');
            feedbackMessage.classList.add('hidden');
            feedbackMessage.textContent = '';
            choicesContainer.innerHTML = '';

            const currentQuiz = quizData[currentQuestionIndex];
            
            // 問題文とカウンターの更新
            questionText.textContent = currentQuiz.question;
            questionCounter.textContent = `第 ${currentQuestionIndex + 1} 問 / 全 ${quizData.length} 問`;

            // 選択肢ボタンの生成
            currentQuiz.choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.textContent = choice;
                button.className = 'choice-btn w-full text-left bg-gray-50 border border-gray-200 hover:bg-gray-100 text-gray-800 font-medium py-3 px-4 rounded-lg';
                button.onclick = () => selectAnswer(index, button);
                choicesContainer.appendChild(button);
            });
        }

        // 回答を選択した時の処理
        function selectAnswer(selectedIndex, selectedButton) {
            if (hasAnswered) return; // 既に回答済みの場合は何もしない
            hasAnswered = true;

            const currentQuiz = quizData[currentQuestionIndex];
            const buttons = choicesContainer.querySelectorAll('button');

            // 正誤判定
            if (selectedIndex === currentQuiz.correctIndex) {
                score++;
                selectedButton.classList.remove('bg-gray-50', 'hover:bg-gray-100', 'border-gray-200');
                selectedButton.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                feedbackMessage.textContent = "⭕ 正解！";
                feedbackMessage.className = "text-center font-bold text-xl mb-4 text-green-600 block";
            } else {
                selectedButton.classList.remove('bg-gray-50', 'hover:bg-gray-100', 'border-gray-200');
                selectedButton.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                feedbackMessage.textContent = "❌ 不正解...";
                feedbackMessage.className = "text-center font-bold text-xl mb-4 text-red-600 block";
            }

            // 正解のボタンを強調表示し、すべてのボタンを無効化する
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-80');
                if (index === currentQuiz.correctIndex) {
                    btn.classList.remove('bg-gray-50', 'border-gray-200');
                    btn.classList.add('bg-green-100', 'border-green-500', 'text-green-800', 'ring-2', 'ring-green-400');
                }
            });

            // 次へボタンを表示
            nextBtn.classList.remove('hidden');
        }

        // 次の問題へ進む処理
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 結果画面を表示する処理
        function showResult() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            document.getElementById('score-text').textContent = score;
            document.getElementById('total-text').textContent = quizData.length;

            const evaluation = document.getElementById('evaluation-message');
            const percentage = score / quizData.length;
            
            if (percentage === 1) {
                evaluation.textContent = "全問正解！素晴らしい知識です！";
            } else if (percentage >= 0.5) {
                evaluation.textContent = "よくできました！あと一息ですね。";
            } else {
                evaluation.textContent = "残念！もう一度挑戦して知識を深めましょう。";
            }
        }

        // クイズを最初からやり直す処理
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            loadQuestion();
        }

        // 最初の問題を読み込む
        loadQuestion();

    </script>
</body>
</html>
